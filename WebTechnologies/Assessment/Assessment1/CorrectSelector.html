<!--4. Use and write the correct selector to hide all odd table rows in a table.-->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Correct Selector</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f2f2f2;
        }

       table{
            margin: auto;
            border-collapse: collapse;
            width: 300px;
            background: white;
            box-shadow: 0px 0px 10px gray;
            }

       td,th{
            border: 1px solid #ddd;
            padding: 10px;
            }


      tr:nth-child(odd) {
                           display: none;
                       }


     tr:nth-child(even) {
                background-color: #f9f9f9;
            }
    </style>
           
    
</head>
<body>
     <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>

            <tr>
                <td>1</td>
                <td>John</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Mary</td>
            </tr>

            <tr>
                <td>3</td>
                <td>David</td>
            </tr>

            <tr>
                <td>4</td>
                <td>Emma</td>
            </tr>
        </table>

    </body>
</html>
