<!--6. Write a jQuery Code to get a single element from a selection.-->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Selection Element</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
     <ul>
        <li>CSHARP</li>
        <li>SQL</li>
        <li>ADO</li>
     </ul>

<script>
$("li").get(1).style.color = "green";
 </script>

</body>
</html>
