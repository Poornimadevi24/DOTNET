<!--1. Write a JavaScript program to calculate multiplication and division of two numbers (input from user).-->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Calculating App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

            button:hover {
                background-color: #45a049;
            }

        h3 {
            color: green;
        }
       
    </style>
</head>
<body>
  <div class="container">
   <h2>Multiplication & Division Calculator</h2>
   <input type="text" id="num1" placeholder="Enter first number">
   <input type="text" id="num2" placeholder="Enter second number">
    <br>
         <button onclick="multiply()">Multiply</button>
         <button onclick="divide()">Divide</button>
     <h3 id="result"></h3>
   </div>
<script>
function multiply()
{
    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;
    let result = n1 * n2;
    document.getElementById("result").innerHTML = "Multiplication Result = " + result;
}

function divide()
{
 let n1 = document.getElementById("num1").value;
 let n2 = document.getElementById("num2").value;

 if (n2 == 0)
 {
     
     document.getElementById("result").innerHTML ="Cannot divide by zero";
 }
 else
 {
   let result = n1 / n2;
   document.getElementById("result").innerHTML ="Division Result = " + result;
  }

}
</script>

 
</body>
</html>
