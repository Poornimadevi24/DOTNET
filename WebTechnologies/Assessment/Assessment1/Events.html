<!--3. Write a JavaScript program that creates a button and add a click event listener to log a message when it's clicked.-->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Click Event</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f2f2f2;
        }

        .box {
            background: white;
            width: 300px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

            button:hover {
                background-color: #45a049;
            }
    </style>
</head>
<body>
      <div class="box">
       <button id="myButton">Click Me</button>
       </div>

<script>
    let button = document.getElementById("myButton");

button.addEventListener("click", function ()
{
    console.log("Button was clicked!");
    alert("Button was clicked!");
    });
</script>

    </body>
</html>
</body>
</html>
