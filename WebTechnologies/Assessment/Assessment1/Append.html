<!--8. Append a <p> element with a text message when an <input> field is changed.-->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Input change</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 10px;
            width: 200px;
        }

        p {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
     <h2>Type something</h2>
     <input type="text" id="myInput">
      <div id="output"></div>
<script>
$("#myInput").change(function ()
{
 $("#output").append("<p>Input field has been changed!</p>");

});
        </script>
</body>
</html>
